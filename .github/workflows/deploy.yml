name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -eu
          [ -n "${VPS_HOST}" ] || { echo "Missing secret: VPS_HOST"; exit 1; }
          [ -n "${VPS_USER}" ] || { echo "Missing secret: VPS_USER"; exit 1; }
          [ -n "${VPS_APP_DIR}" ] || { echo "Missing secret: VPS_APP_DIR"; exit 1; }
          [ -n "${VPS_SSH_KEY}" ] || { echo "Missing secret: VPS_SSH_KEY"; exit 1; }

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -eu
          SSH_PORT="${VPS_PORT:-22}"
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${VPS_SSH_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

          if [ -n "${VPS_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${VPS_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          else
            ssh-keyscan -p "${SSH_PORT}" -H "${VPS_HOST}" >> "${HOME}/.ssh/known_hosts"
          fi

      - name: Deploy on server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -eu
          SSH_PORT="${VPS_PORT:-22}"
          ssh \
            -i "${HOME}/.ssh/id_ed25519" \
            -p "${SSH_PORT}" \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "cd '${VPS_APP_DIR}' && DEPLOY_BRANCH='${DEPLOY_BRANCH}' sh deploy.sh"
